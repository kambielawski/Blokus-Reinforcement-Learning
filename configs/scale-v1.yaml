# Scaled-up training with sparse buffer + LR schedule
# Target: 500 iters, 200K buffer, cosine LR decay
# Expected: ~12,500 games, ~750K examples over ~24-36h on H200

network:
  num_blocks: 5
  channels: 128

mcts:
  num_simulations: 500
  top_k_actions: 50

training:
  learning_rate: 0.001
  batch_size: 64
  epochs_per_iter: 5
  iterations: 500
  replay_buffer_size: 200000      # 200K examples, ~2.4 GB with sparse storage
  value_loss_weight: 10.0
  lr_schedule:
    enabled: true
    warmup_iters: 10              # Ramp up over first 10 iters
    min_lr: 0.0001                # 10x decay by end

self_play:
  games_per_iteration: 25
  num_workers: 8                  # Use all 8 CPUs

eval:
  interval: 10
  games: 200                      # 200 games per eval mode (raw + MCTS)
  mcts_sims: 25

wandb:
  enabled: true
  run_name: scale-v1-500iter-200k-cosine

device: auto
