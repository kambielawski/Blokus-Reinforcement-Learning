# Full-size network for real training runs

network:
  num_blocks: 5
  channels: 128

mcts:
  num_simulations: 100

training:
  learning_rate: 0.001
  batch_size: 64
  epochs_per_iter: 5
  iterations: 100
  replay_buffer_size: 25000       # ~13.3 GB RAM; 50K was OOM on 64GB nodes
  value_loss_weight: 10.0

self_play:
  games_per_iteration: 25
  num_workers: 4

wandb:
  enabled: true

device: auto
