# Long training run with score-diff targets (the winning fix)
# Resume from iter 117 best checkpoint, 500 iters total
# Score-diff targets solve value head overconfidence, enabling MCTS > raw policy

network:
  num_blocks: 5
  channels: 128

mcts:
  num_simulations: 500
  top_k_actions: 50

training:
  learning_rate: 0.001
  batch_size: 64
  epochs_per_iter: 5
  iterations: 500
  replay_buffer_size: 200000
  value_loss_weight: 10.0
  score_diff_targets: true
  lr_schedule:
    enabled: true
    warmup_iters: 10
    min_lr: 0.0001

self_play:
  games_per_iteration: 25
  num_workers: 8

eval:
  interval: 10
  games: 200
  mcts_sims: 25

wandb:
  enabled: true
  run_name: scale-v2-score-diff-500iter

device: auto
